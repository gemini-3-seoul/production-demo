name: Build and Deploy to Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: 'project-035a75f4-af33-4445-a86' # TODO: GCP 프로젝트 ID로 변경하세요
  REGION: 'asia-northeast3'         # TODO: 배포할 리전 (예: 서울 리전)
  SERVICE_NAME: 'production-demo'   # TODO: Cloud Run 서비스 이름
  GAR_LOCATION: 'asia-northeast3'   # TODO: Artifact Registry 리전
  REPOSITORY: 'product-demo'       # TODO: Artifact Registry 저장소 이름
  # WORKLOAD_IDENTITY_PROVIDER: 'projects/123456789/locations/global/workloadIdentityPools/my-pool/providers/my-provider' # OIDC 사용시 필요
  SERVICE_ACCOUNT: 'product-demo-for-gemini-3--677@project-035a75f4-af33-4445-a86.iam.gserviceaccount.com'

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Google Cloud 인증
      # 방법 A: Workload Identity Federation (권장)
      # - name: Google Auth
      #   id: auth
      #   uses: 'google-github-actions/auth@v2'
      #   with:
      #     token_format: 'access_token'
      #     workload_identity_provider: '${{ env.WORKLOAD_IDENTITY_PROVIDER }}'
      #     service_account: '${{ env.SERVICE_ACCOUNT }}'

      # 방법 B: Service Account Key (대안) - GitHub Secrets에 GCP_CREDENTIALS 로 JSON 키 저장
      - name: Google Auth
        id: auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      # 2. Docker Auth 설정
      - name: Docker Auth
        id: docker-auth
        uses: 'docker/login-action@v3'
        with:
          username: 'oauth2accesstoken'
          password: '${{ steps.auth.outputs.access_token }}'
          registry: '${{ env.GAR_LOCATION }}-docker.pkg.dev'

      # 3. Docker 이미지 빌드 및 푸시
      - name: Build and Push Container
        run: |-
          DOCKER_TAG="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          docker build -t "${DOCKER_TAG}" .
          docker push "${DOCKER_TAG}"

      # 4. Cloud Run 배포
      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          # NOTE: If using a pre-built image, update the image name here
          image: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}

      # 5. 배포된 URL 출력
      - name: Show Output
        run: echo ${{ steps.deploy.outputs.url }}

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>매장 안내</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        img { max-width: 400px; border-radius: 10px; }
        .map-btn { display: inline-block; padding: 10px 20px; background: #4285f4; color: white; text-decoration: none; border-radius: 5px; }

</head>
<body>
    <h1>$store_name</h1>

</body>
</html>
